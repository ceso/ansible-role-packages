---
# roles/ansible-role-packages/defaults/main.yml

# @var packages_repos:type: list[dict]
# @var packages_repos:description: Extra third party repositories to be added by Linux OS flavour
# @var packages_repos:example: >
# packages_repos:
#   - name: mullvad
#     Debian:
#       types: [deb]
#       uris: "https://repository.mullvad.net/deb/stable"
#       suites: [stable]
#       components: [main]
#       signed_by: "https://repository.mullvad.net/deb/mullvad-keyring.asc"
#     RedHat:
#       baseurl: "https://repository.mullvad.net/rpm/stable/$basearch"
#       gpgkey: "https://repository.mullvad.net/rpm/mullvad-keyring.asc"
#       gpgcheck: true
# @end
packages_repos: []

# @var packages_native_name_per_distro:type: dict[string, dict[string, string]]
# @var packages_native_name_per_distro:description: >
# Maps package logical names to their distro-specific package names.
# Keys are looked up by the role and resolved to the correct name
# for the target OS family.
# @end
# @var packages_native_name_per_distro:example: >
# packages_native_name_per_distro:
#   fonts-nerd:
#     Debian: fonts-jetbrains-mono
#     RedHat: jetbrains-mono-fonts-all
#     Archlinux: ttf-jetbrains-mono-nerd
# @end
packages_native_name_per_distro:
  fonts-nerd:
    Debian: fonts-jetbrains-mono
    RedHat: jetbrains-mono-fonts-all
    Archlinux: ttf-jetbrains-mono-nerd
  libnotify:
    Debian: libnotify-bin
    RedHat: libnotify
    Archlinux: libnotify
  zim:
    RedHat: Zim
    Debian: zim
  lm_sensors:
    RedHat: lm_sensors
    Debian: lm-sensors

# @var packages_native:type: list[dict]
# @var packages_native:description: >
# @end
packages_native:
  - name: unzip
  - name: flatpak
  - name: upower
  - name: podman
  - name: flameshot
  - name: gtk4-layer-shell

# @var packages_homebrew_taps:type: list[dict]
# @var packages_homebrew_taps:description: >
# Third-party Homebrew taps to register before installing packages.
# Each entry needs a name (formula) and a tap (repository).
# @end
# @var packages_homebrew_taps:example: >
# packages_homebrew_taps:
#   - name: vet-run
#     tap: vet-run/vet
# @end
packages_homebrew_taps:
  - name: vet-run
    tap: vet-run/vet

# @var packages_homebrew:type: list[dict]
# @var packages_homebrew:description: >
# Packages installed via Homebrew from the default repository.
# @end
# @var packages_homebrew:example: >
# packages_homebrew:
#   - name: bat
#   - name: fzf
# @end
packages_homebrew:
  - name: awscli
  - name: bat
  - name: bat-extras
  - name: btop
  - name: entr
  - name: eza
  - name: fastfetch
  - name: fd
  - name: fuck
  - name: fish
  - name: fzf
  - name: go
  - name: hexyl
  - name: jq
  - name: kubectx
  - name: kubectl
  - name: helm
  - name: neovim
  - name: prek
  - name: ripgrep
  - name: shellcheck
  - name: shfmt
  - name: tre-command
  - name: zellij
  - name: zoxide
  - name: reuse

# ------------------------------------------
# AppImage applications
# ------------------------------------------
# @var packages_appimage:type: list[dict]
# @var packages_appimage:description: >
# AppImage applications managed by the install_appimage module.
# Bundled .desktop files are automatically extracted and symlinked
# to ~/.local/share/applications/.
# @end
# @var packages_appimage:example: >
# packages_appimage:
#   - name: ghostty
#     url: "https://github.com/AppImageCommunity/AppImageUpdate/releases/download/2.0.0-alpha-1-20251018/appimageupdatetool-x86_64.AppImage"
# @end
packages_appimage:
  - name: appimageupdatetool
    url: "https://github.com/AppImageCommunity/AppImageUpdate/releases/download/2.0.0-alpha-1-20251018/appimageupdatetool-x86_64.AppImage"

# ------------------------------------------
# Direct download applications
# ------------------------------------------
# Extracts to ~/.local/share/<name>/, symlinks binary to ~/.local/bin/
# desktop: creates .desktop launcher, icon is relative to the install dir
# @var packages_binary:type: list[dict]
# @var packages_binary:description: >
# Zip/binary applications downloaded and extracted directly.
# @end
# @var packages_binary:example: >
# packages_binary:
#   - name: winbox
#     url: "https://download.mikrotik.com/routeros/winbox/4.0.1/WinBox_Linux.zip"
#     checksum_url: "https://download.mikrotik.com/routeros/winbox/4.0.1/WinBox_Linux.zip.sha256"
#     binary: WinBox
#     desktop:
#       display_name: WinBox
#       comment: Configuration tool for RouterOS
#       categories: "Network;RemoteAccess;"
# @end
packages_binary: []

# @var packages_flatpak_remotes:type: list[dict]
# @var packages_flatpak_remotes:description: >
# Flatpak remote repositories to register before installing packages.
# Each entry needs a name and a url. Optional method controls system
# or user installation (default: system).
# @end
# @var packages_flatpak_remotes:example: >
# packages_flatpak_remotes:
#   - name: flathub
#     url: "https://dl.flathub.org/repo/flathub.flatpakrepo"
#   - name: flathub-beta
#     url: "https://dl.flathub.org/beta-repo/flathub-beta.flatpakrepo"
#     method: user
# @end
packages_flatpak_remotes:
  - name: flathub
    url: "https://dl.flathub.org/repo/flathub.flatpakrepo"

# @var packages_flatpak:type: list[dict]
# @var packages_flatpak:description: >
# Packages to be installed via Flatpak.
# Each entry accepts name, state (default: present), remote (default: flathub),
# and method (default: system). Method controls system or user installation.
# @end
# @var packages_flatpak:example: >
# packages_flatpak:
#   - name: com.discordapp.Discord
#   - name: org.kde.kate
#     method: user
#   - name: com.example.OldApp
#     state: absent
# @end
packages_flatpak: []

# @var packages_uv:type: list[dict]
# @var packages_uv:description: >
# Python tools installed via uv in isolated virtual environments.
# Each entry accepts name, state, and with_packages keys.
# @end
# @var packages_uv:example: >
# packages_uv:
#   - name: molecule
#     with_packages:
#       - molecule-plugins[podman]
#   - name: ruff
# @end
packages_uv:
  - name: molecule
    with_packages:
      - molecule-plugins[podman]
      - molecule-plugins[vagrant]

# @var extra_packages_repos:type: list[dict]
# @var extra_packages_repos:description: >
# Additional repositories appended to the default 'packages_repos'.
# @end
extra_packages_repos: []
# @var extra_packages_native_name_per_distro:description: >
# Additional distro-specific package name mappings appended to the default 'packages_native_name_per_distro'.
# @end
extra_packages_native_name_per_distro: {}
# @var extra_packages_native:description: >
# Additional native packages appended to the default 'packages_native'.
# @end
extra_packages_native: []
# @var extra_packages_homebrew_taps:description: >
# Additional Homebrew taps appended to the default 'packages_homebrew_taps'.
# @end
extra_packages_homebrew_taps: []
# @var extra_packages_homebrew:description: >
# Additional Homebrew packages appended to the default 'packages_homebrew'.
# @end
extra_packages_homebrew: []
# @var extra_packages_flatpak_remotes:description: >
# Additional Flatpak remotes appended to the default 'packages_flatpak_remotes'.
# @end
extra_packages_flatpak_remotes: []
# @var extra_packages_flatpak:description: >
# Additional Flatpak packages appended to the default 'packages_flatpak'.
# @end
extra_packages_flatpak: []
# @var extra_packages_appimage:description: >
# Additional AppImage applications appended to the default 'packages_appimage'.
# @end
extra_packages_appimage: []
# @var extra_packages_binary:description: >
# Additional direct download apps appended to the default 'packages_binary'.
# @end
extra_packages_binary: []
